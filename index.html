<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ders Çalışma Portalı</title>
    <!-- FontAwesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --primary-color: #4a90e2;
            --accent-color: #ff6b6b;
            --border-color: #e0e0e0;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --text-color: #e9ecef;
            --primary-color: #0f3460;
            --accent-color: #e94560;
            --border-color: #0f3460;
            --shadow: 0 4px 6px rgba(0,0,0,0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto 30px auto;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
        }

        .theme-toggle-btn {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card h2 {
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-color);
        }

        [data-theme="dark"] .card h2 {
            color: #4a90e2;
        }

        /* Pomodoro */
        .timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            margin: 15px 0;
            font-family: monospace;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button.btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary-color);
            color: white;
        }

        button.btn-danger {
            background-color: var(--accent-color);
        }

        button.btn-secondary {
            background-color: #6c757d;
        }

        /* Form Elemanları */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input, textarea {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 0.95rem;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
        }

        .result-box {
            margin-top: 10px;
            padding: 12px;
            border-radius: 6px;
            background-color: var(--bg-color);
            text-align: center;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .timer-display { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-graduation-cap"></i> Ders Portalı</h1>
        <button class="theme-toggle-btn" id="themeToggle" title="Tema Değiştir">
            <i class="fa-solid fa-moon"></i>
        </button>
    </header>

    <div class="container">
        
        <!-- POMODORO ZAMANLAYICI -->
        <div class="card">
            <h2><i class="fa-solid fa-clock"></i> Pomodoro Zamanlayıcı</h2>
            <div class="timer-display" id="timer">25:00</div>
            <div class="btn-group">
                <button class="btn" id="startBtn"><i class="fa-solid fa-play"></i> Başlat</button>
                <button class="btn btn-secondary" id="pauseBtn"><i class="fa-solid fa-pause"></i> Duraklat</button>
                <button class="btn btn-danger" id="resetBtn"><i class="fa-solid fa-rotate-right"></i> Sıfırla</button>
            </div>
            <div class="result-box" id="modeStatus">Mod: Ders Çalışma (25 dk)</div>
        </div>

        <!-- NOT DEFTERİ -->
        <div class="card">
            <h2><i class="fa-solid fa-note-sticky"></i> Hızlı Not Defteri</h2>
            <textarea id="noteInput" placeholder="Notlarınızı yazın... Tarayıcı hafızasına otomatik kaydedilir."></textarea>
            <div class="btn-group" style="justify-content: flex-end;">
                <span id="saveStatus" style="font-size: 0.85rem; opacity: 0.7; align-self: center;"></span>
            </div>
        </div>

        <!-- ORTALAMA HESAPLAYICI -->
        <div class="card">
            <h2><i class="fa-solid fa-calculator"></i> Not Hesaplayıcı</h2>
            <div class="input-group">
                <label for="vize">Vize Notu (%40):</label>
                <input type="number" id="vize" placeholder="Örn: 70" min="0" max="100">
            </div>
            <div class="input-group">
                <label for="final">Final Notu (%60):</label>
                <input type="number" id="final" placeholder="Örn: 85" min="0" max="100">
            </div>
            <button class="btn" id="calcBtn"><i class="fa-solid fa-square-poll-vertical"></i> Hesapla</button>
            <div class="result-box" id="gradeResult">Ortalama: -</div>
        </div>

    </div>

    <!-- JS dosyasını bağladık -->
    <script src="script.js"></script>
</body>
</html>
